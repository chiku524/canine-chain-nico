name: Unit Test

on:
  pull_request:
  push:
    branches: ["master", "feat/**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5
        with:
          go-version: 1.23
      - name: Install wasmvm shared library
        run: |
          WASMVM_VERSION=$(go list -m -f '{{.Version}}' github.com/CosmWasm/wasmvm)
          sudo wget -q "https://github.com/CosmWasm/wasmvm/raw/${WASMVM_VERSION}/internal/api/libwasmvm.x86_64.so" \
            -O /usr/lib/libwasmvm.x86_64.so
      - name: Test
        shell: bash
        run: make test-unit
